            function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

                        }).join('');
                    })
                    .catch(function() { document.getElementById('comments-list').innerHTML = '<div class="comment-error">璇勮鍔犺浇澶辫触锛岃鍒锋柊閲嶈瘯</div>'; });
            }

            window.refreshComments = function() {
                document.getElementById('comments-list').innerHTML = '<div class="comment-loading">鍔犺浇涓?..</div>';
                findOrCreateIssue().then(loadComments);
            };

            findOrCreateIssue().then(loadComments);

            // 鎻愪氦璇勮
            document.getElementById('comment-form').addEventListener('submit', function(e) {
                e.preventDefault();
                var nick = document.getElementById('comment-nick').value.trim();
                var body = document.getElementById('comment-body').value.trim();
                if (!body) return;
                if (!currentIssueNum) { alert('璇勮绯荤粺鍒濆鍖栦腑锛岃绋嶅€?); return; }
                var btn = document.getElementById('comment-submit-btn');
                btn.disabled = true; btn.textContent = '鍙戝竷涓?..';
                var payload = '[' + nick + '] ' + body;
                api('https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/issues/' + currentIssueNum + '/comments', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ body: payload })
                }).then(function(r) {
                    if (r.ok) {
                        document.getElementById('comment-body').value = '';
                        document.getElementById('comment-char-count').textContent = '0/500';
                        loadComments();
                    } else { alert('鍙戝竷澶辫触锛岃閲嶈瘯'); }
                }).catch(function() { alert('缃戠粶閿欒锛岃閲嶈瘯'); })
                .finally(function() { btn.disabled = false; btn.textContent = '鍙戝竷'; });
            });

            document.getElementById('comment-body').addEventListener('input', function() {
                document.getElementById('comment-char-count').textContent = this.value.length + '/500';
            });
        })();
    </script>
    <script>
        // Make entire card clickable - navigates to job detail page
        document.querySelectorAll('.job-card').forEach(function(card) {
            var link = card.querySelector('.apply-link');
            if (!link) return;
            // Prevent card click when clicking the apply button directly
            link.addEventListener('click', function(e) { e.stopPropagation(); });
            // Clicking anywhere else on the card opens the detail page
            card.addEventListener('click', function() { link.click(); });
        });
    </script>
